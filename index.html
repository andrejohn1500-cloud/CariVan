<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>CariVan – St. Vincent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a1628; overflow: hidden; width: 100vw; height: 100vh; }
    #renderCanvas { width: 100%; height: 100%; touch-action: none; display: block; }
    #loading {
      position: absolute; inset: 0; background: #0a1628;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; color: #fff;
      font-family: system-ui, sans-serif; z-index: 100;
    }
    #loading h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; color: #4ade80; }
    #loading p { font-size: 1rem; color: #94a3b8; margin-bottom: 2rem; }
    #progress-bar { width: 240px; height: 4px; background: #1e3a5f; border-radius: 2px; overflow: hidden; }
    #progress-fill { height: 100%; background: #4ade80; border-radius: 2px; width: 0%; transition: width 0.3s ease; }
    #status-text { margin-top: 1rem; font-size: 0.85rem; color: #64748b; }

    /* HUD */
    #hud {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); border-radius: 20px;
      padding: 4px 18px; color: #fff; font-family: system-ui, sans-serif;
      font-size: 0.9rem; z-index: 10; pointer-events: none;
      display: flex; align-items: center; gap: 10px;
    }
    #speed-val { font-size: 1.3rem; font-weight: 700; color: #facc15; }

    /* Joystick */
    #joystick-zone {
      position: absolute; bottom: 30px; left: 30px;
      width: 120px; height: 120px; z-index: 10;
    }
    #joystick-base {
      width: 120px; height: 120px; border-radius: 60px;
      background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.25);
      position: relative;
    }
    #joystick-stick {
      width: 48px; height: 48px; border-radius: 24px;
      background: rgba(250,204,21,0.85); border: 2px solid #fff;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      transition: transform 0.05s;
    }

    /* Honk */
    #honk-btn {
      position: absolute; bottom: 40px; right: 30px;
      width: 80px; height: 80px; border-radius: 40px; z-index: 10;
      background: rgba(220,38,38,0.85); border: 3px solid #fff;
      color: #fff; font-size: 1.1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; cursor: pointer; user-select: none;
      font-family: system-ui, sans-serif;
    }
    #honk-btn span { font-size: 0.65rem; margin-top: 2px; }

    /* Flag badge */
    #flag-badge {
      position: absolute; top: 12px; right: 14px;
      font-size: 1.5rem; z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="loading">
    <h1>CariVan 🇻🇨</h1>
    <p>St. Vincent &amp; the Grenadines</p>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="status-text">Loading island...</div>
  </div>

  <!-- HUD -->
  <div id="hud" style="display:none">
    <span>🚐</span>
    <span id="speed-val">0</span>
    <span style="font-size:0.75rem;color:#94a3b8">km/h</span>
    <span style="margin-left:8px;font-size:0.8rem;color:#4ade80">SVG 🇻🇨</span>
  </div>

  <div id="flag-badge">🇻🇨</div>

  <!-- Touch joystick -->
  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-stick"></div>
    </div>
  </div>

  <!-- Honk -->
  <div id="honk-btn">
    📯
    <span>HONK</span>
  </div>

  <script type="module" src="/src/main.js"></script>

  <script>
    window.touchInput = { x: 0, y: 0, honk: false };

    // Joystick
    const zone = document.getElementById('joystick-zone');
    const base = document.getElementById('joystick-base');
    const stick = document.getElementById('joystick-stick');
    const R = 36, baseR = 60;
    let joyId = null, joyOrigin = null;

    function joyMove(cx, cy) {
      const rect = base.getBoundingClientRect();
      const ox = rect.left + baseR, oy = rect.top + baseR;
      let dx = cx - ox, dy = cy - oy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > R) { dx = dx/dist*R; dy = dy/dist*R; }
      stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      window.touchInput.x = dx / R;
      window.touchInput.y = -(dy / R);
    }
    function joyReset() {
      stick.style.transform = 'translate(-50%,-50%)';
      window.touchInput.x = 0;
      window.touchInput.y = 0;
      joyId = null;
    }

    base.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      joyId = t.identifier;
      joyMove(t.clientX, t.clientY);
    }, { passive: false });
    window.addEventListener('touchmove', e => {
      for (const t of e.changedTouches) {
        if (t.identifier === joyId) { e.preventDefault(); joyMove(t.clientX, t.clientY); }
      }
    }, { passive: false });
    window.addEventListener('touchend', e => {
      for (const t of e.changedTouches) {
        if (t.identifier === joyId) joyReset();
      }
    });

    // Honk
    const honkBtn = document.getElementById('honk-btn');
    honkBtn.addEventListener('touchstart', e => { e.preventDefault(); window.touchInput.honk = true; });
    honkBtn.addEventListener('touchend', e => { e.preventDefault(); window.touchInput.honk = false; });

    // Speed HUD updater
    const hud = document.getElementById('hud');
    const speedVal = document.getElementById('speed-val');
    setInterval(() => {
      if (window.gameVan) {
        hud.style.display = 'flex';
        speedVal.textContent = Math.abs(Math.round(window.gameVan.speed));
      }
    }, 100);

    // Hide joystick/honk until game loads
    document.getElementById('joystick-zone').style.display = 'none';
    document.getElementById('honk-btn').style.display = 'none';
    document.getElementById('flag-badge').style.display = 'none';
    const observer = setInterval(() => {
      if (window.gameVan) {
        document.getElementById('joystick-zone').style.display = 'block';
        document.getElementById('honk-btn').style.display = 'flex';
        document.getElementById('flag-badge').style.display = 'block';
        clearInterval(observer);
      }
    }, 500);
  </script>
</body>
</html>
