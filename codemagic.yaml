workflows:
  android-workflow:
    name: CariVan Android Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Vite bundle
        script: npm run build
      - name: Add Android platform if needed
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Make gradlew executable
        script: chmod +x android/gradlew
      - name: Build debug APK
        script: cd android && ./gradlew assembleDebug --build-cache
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk